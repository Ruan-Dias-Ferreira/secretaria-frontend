<h2 mat-dialog-title>Detalhes da Turma</h2>
<mat-dialog-content>
  @if (loading) {
    <div class="loading">
      <mat-spinner diameter="40"></mat-spinner>
    </div>
  }

  @if (!loading && turma) {
    <dl>
      <dt>ID</dt><dd>{{ turma.id }}</dd>
      <dt>Nome</dt><dd>{{ turma.nome }}</dd>
      <dt>Ano Letivo</dt><dd>{{ turma.anoLetivo }}</dd>
      <dt>Turno</dt><dd>{{ turma.turno }}</dd>
      <dt>Curso</dt><dd>{{ turma.curso }}</dd>
    </dl>
  }

  @if (errorMsg) {
    <p class="error">{{ errorMsg }}</p>
  }
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="fechar()">Fechar</button>
</mat-dialog-actions>
