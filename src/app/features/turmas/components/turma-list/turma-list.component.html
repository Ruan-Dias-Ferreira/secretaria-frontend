<div class="page-container">
  <div class="page-header">
    <h1>Turmas</h1>
    <button *ngIf="isSecretaria" mat-flat-button color="primary" (click)="abrirNovo()">
      <mat-icon>add</mat-icon>
      Nova Turma
    </button>
  </div>

  <div *ngIf="loading" class="loading-overlay">
    <mat-spinner diameter="48"></mat-spinner>
  </div>

  <table mat-table [dataSource]="turmas" *ngIf="!loading && turmas.length > 0">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let t">{{ t.id }}</td>
    </ng-container>

    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef>Nome</th>
      <td mat-cell *matCellDef="let t">{{ t.nome }}</td>
    </ng-container>

    <ng-container matColumnDef="anoLetivo">
      <th mat-header-cell *matHeaderCellDef>Ano Letivo</th>
      <td mat-cell *matCellDef="let t">{{ t.anoLetivo }}</td>
    </ng-container>

    <ng-container matColumnDef="turno">
      <th mat-header-cell *matHeaderCellDef>Turno</th>
      <td mat-cell *matCellDef="let t">{{ t.turno }}</td>
    </ng-container>

    <ng-container matColumnDef="curso">
      <th mat-header-cell *matHeaderCellDef>Curso</th>
      <td mat-cell *matCellDef="let t">{{ t.curso }}</td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef style="text-align:right;">Ações</th>
      <td mat-cell *matCellDef="let t">
        <div class="actions-cell">
          <button mat-icon-button matTooltip="Detalhes" (click)="abrirDetalhe(t.id)">
            <mat-icon>info</mat-icon>
          </button>
          <button
            *ngIf="isSecretaria"
            mat-icon-button
            color="primary"
            matTooltip="Editar"
            (click)="abrirEdicao(t.id)"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button
            *ngIf="isSecretaria"
            mat-icon-button
            color="warn"
            matTooltip="Excluir"
            (click)="excluir(t.id, t.nome)"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <div *ngIf="!loading && turmas.length === 0" class="empty-state">
    <mat-icon style="font-size:48px;width:48px;height:48px;">class</mat-icon>
    <p>Nenhuma turma cadastrada.</p>
  </div>
</div>

<app-turma-form
  *ngIf="modalAtivo === 'form'"
  [turmaId]="turmaSelecionadaId"
  (close)="fecharModal()">
</app-turma-form>
