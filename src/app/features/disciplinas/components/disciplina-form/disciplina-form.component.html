<div class="overlay" (click)="cancelar()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ isEdicao ? 'Editar Disciplina' : 'Nova Disciplina' }}</h2>
      <button mat-icon-button (click)="cancelar()" aria-label="Fechar">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="form">
      <div class="form-grid">
        <mat-form-field appearance="outline" class="full">
          <mat-label>Nome</mat-label>
          <input matInput formControlName="nome" />
          <mat-error *ngIf="form.get('nome')?.hasError('required')">Nome é obrigatório.</mat-error>
          <mat-error *ngIf="form.get('nome')?.hasError('minlength')">Mínimo 2 caracteres.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Carga Horária (h)</mat-label>
          <input matInput type="number" formControlName="cargaHoraria" />
          <mat-error *ngIf="form.get('cargaHoraria')?.invalid">Informe carga horária válida.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Turma</mat-label>
          <mat-select formControlName="turmaId">
            <mat-option *ngFor="let t of turmas" [value]="t.id">
              {{ t.nome }} ({{ t.anoLetivo }} - {{ t.turno }})
            </mat-option>
          </mat-select>
          <mat-error *ngIf="form.get('turmaId')?.hasError('required')">Selecione uma turma.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full">
          <mat-label>Professor (opcional)</mat-label>
          <mat-select formControlName="professorId">
            <mat-option [value]="null">Sem professor</mat-option>
            <mat-option *ngFor="let p of professores" [value]="p.id">
              {{ p.login }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="actions">
        <button type="button" mat-button (click)="cancelar()">Cancelar</button>
        <button type="submit" mat-flat-button color="primary" [disabled]="loading">
          <span *ngIf="!loading">{{ isEdicao ? 'Atualizar' : 'Salvar' }}</span>
          <span *ngIf="loading" class="loading-inline">
            <mat-spinner diameter="18"></mat-spinner> Salvando...
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
