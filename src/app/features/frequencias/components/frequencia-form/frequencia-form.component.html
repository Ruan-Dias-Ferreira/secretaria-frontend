<div class="overlay" (click)="cancelar()">
  <div class="dialog-card" (click)="$event.stopPropagation()">
    <div class="dialog-title">
      <h2>{{ isEdicao ? 'Editar Frequência' : 'Nova Frequência' }}</h2>
      <button mat-icon-button (click)="cancelar()" aria-label="Fechar">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <div *ngIf="loading" class="spinner-center">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!loading">
      <div class="form-grid">
        <mat-form-field appearance="outline" class="full">
          <mat-label>Aluno</mat-label>
          <mat-select formControlName="alunoId">
            <mat-option *ngFor="let a of alunos" [value]="a.id">{{ a.nome }}</mat-option>
          </mat-select>
          <mat-error *ngIf="form.get('alunoId')?.hasError('required')">Selecione um aluno.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full">
          <mat-label>Disciplina</mat-label>
          <mat-select formControlName="disciplinaId">
            <mat-option *ngFor="let d of disciplinas" [value]="d.id">{{ d.nome }}</mat-option>
          </mat-select>
          <mat-error *ngIf="form.get('disciplinaId')?.hasError('required')">Selecione uma disciplina.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Data</mat-label>
          <input matInput type="date" formControlName="data" />
          <mat-error *ngIf="form.get('data')?.hasError('required')">Informe a data.</mat-error>
        </mat-form-field>

        <div style="display:flex; align-items:center; padding-top: 12px;">
          <mat-checkbox formControlName="presente">Presente</mat-checkbox>
        </div>
      </div>

      <div class="dialog-actions">
        <button type="button" mat-button (click)="cancelar()">Cancelar</button>
        <button type="submit" mat-flat-button color="primary" [disabled]="loading">
          {{ isEdicao ? 'Atualizar' : 'Salvar' }}
        </button>
      </div>
    </form>
  </div>
</div>
