<div class="page-container">
  <div class="page-header">
    <h1>Usuários</h1>
    <button mat-flat-button color="primary" (click)="abrirNovo()">
      <mat-icon>add</mat-icon>
      Novo Usuário
    </button>
  </div>

  <div *ngIf="loading" class="loading-overlay">
    <mat-spinner diameter="48"></mat-spinner>
  </div>

  <table mat-table [dataSource]="usuarios" *ngIf="!loading && usuarios.length > 0">

    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let u">{{ u.id }}</td>
    </ng-container>

    <ng-container matColumnDef="login">
      <th mat-header-cell *matHeaderCellDef>Login</th>
      <td mat-cell *matCellDef="let u">{{ u.login }}</td>
    </ng-container>

    <ng-container matColumnDef="role">
      <th mat-header-cell *matHeaderCellDef>Role</th>
      <td mat-cell *matCellDef="let u">
        <span class="badge" [ngClass]="getRoleClass(u.role)">{{ u.role }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef style="text-align:right;">Ações</th>
      <td mat-cell *matCellDef="let u">
        <div class="actions-cell">
          <button mat-icon-button color="primary" matTooltip="Editar" (click)="abrirEdicao(u.id!)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" matTooltip="Excluir" (click)="excluir(u.id!, u.login)">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <div *ngIf="!loading && usuarios.length === 0" class="empty-state">
    <mat-icon style="font-size:48px;width:48px;height:48px;">manage_accounts</mat-icon>
    <p>Nenhum usuário cadastrado.</p>
  </div>
</div>

<app-usuario-form
  *ngIf="modalFormAberto"
  [usuarioId]="usuarioSelecionadoId"
  (close)="fecharModal()">
</app-usuario-form>
