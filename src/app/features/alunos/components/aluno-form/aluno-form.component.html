<div class="overlay" (click)="cancelar()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ isEdicao ? 'Editar Aluno' : 'Novo Aluno' }}</h2>
      <button mat-icon-button (click)="cancelar()" aria-label="Fechar">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <div *ngIf="loading" class="loading-overlay">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="form && !loading">
      <div class="form-grid">
        <mat-form-field appearance="outline" class="full">
          <mat-label>Nome</mat-label>
          <input matInput formControlName="nome" />
          <mat-error *ngIf="form.get('nome')?.hasError('required')">Obrigatório.</mat-error>
          <mat-error *ngIf="form.get('nome')?.hasError('minlength')">Mínimo 3 caracteres.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>CPF</mat-label>
          <input matInput formControlName="cpf" />
          <mat-error>Obrigatório.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>RG</mat-label>
          <input matInput formControlName="rg" />
          <mat-error>Obrigatório.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Data de Nascimento</mat-label>
          <input matInput type="date" formControlName="dataNascimento" />
          <mat-error>Obrigatório.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Telefone</mat-label>
          <input matInput formControlName="telefone" />
          <mat-error>Obrigatório.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" />
          <mat-error *ngIf="form.get('email')?.hasError('required')">Obrigatório.</mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">Email inválido.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full">
          <mat-label>Endereço</mat-label>
          <input matInput formControlName="endereco" />
          <mat-error>Obrigatório.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Nome da Mãe</mat-label>
          <input matInput formControlName="nomeMae" />
          <mat-error>Obrigatório.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Nome do Pai</mat-label>
          <input matInput formControlName="nomePai" />
        </mat-form-field>
      </div>

      <div class="actions">
        <button type="button" mat-button (click)="cancelar()">Cancelar</button>
        <button type="submit" mat-flat-button color="primary" [disabled]="loading">
          {{ isEdicao ? 'Atualizar' : 'Salvar' }}
        </button>
      </div>
    </form>
  </div>
</div>
