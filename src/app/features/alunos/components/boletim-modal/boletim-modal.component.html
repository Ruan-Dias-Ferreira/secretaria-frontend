<div class="overlay" (click)="fechar()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Boletim — Aluno #{{ alunoId }}</h2>
      <button class="close-btn" (click)="fechar()">&times;</button>
    </div>

    <div *ngIf="loading" class="loading">Carregando boletim...</div>

    <div *ngIf="errorMsg" class="empty">{{ errorMsg }}</div>

    <div *ngIf="!loading && boletim.length === 0 && !errorMsg" class="empty">
      Aluno sem notas cadastradas.
    </div>

    <table *ngIf="!loading && boletim.length > 0">
      <thead>
        <tr>
          <th>Disciplina</th>
          <th>1º Bim</th>
          <th>2º Bim</th>
          <th>3º Bim</th>
          <th>4º Bim</th>
          <th>Média</th>
          <th>Situação</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of boletim">
          <td>{{ item.nomeDisciplina }}</td>
          <td *ngFor="let bim of [1,2,3,4]">
            {{ notaPorBimestre(item, bim) ?? '—' }}
          </td>
          <td><strong>{{ item.mediaNotaDisciplina | number:'1.2-2' }}</strong></td>
          <td><span [class]="badgeClass(item.situacaoNota)">{{ item.situacaoNota }}</span></td>
        </tr>
      </tbody>
    </table>

    <div class="actions">
      <button (click)="fechar()">Fechar</button>
    </div>
  </div>
</div>
