<div class="overlay" (click)="cancelar()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ isEdicao ? 'Editar Matrícula' : 'Nova Matrícula' }}</h2>
      <button class="close-btn" (click)="cancelar()">&times;</button>
    </div>

    <div *ngIf="errorMsg" class="alert">{{ errorMsg }}</div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="form">
      <div class="form-grid">
        <div class="full">
          <label>Aluno *</label>
          <select formControlName="alunoId" [class.invalid]="campoInvalido('alunoId')">
            <option [ngValue]="null" disabled>Selecione um aluno</option>
            <option *ngFor="let a of alunos" [ngValue]="a.id">{{ a.nome }} ({{ a.cpf }})</option>
          </select>
          <div class="error" *ngIf="campoInvalido('alunoId')">Selecione um aluno.</div>
        </div>

        <div class="full">
          <label>Turma *</label>
          <select formControlName="turmaId" [class.invalid]="campoInvalido('turmaId')">
            <option [ngValue]="null" disabled>Selecione uma turma</option>
            <option *ngFor="let t of turmas" [ngValue]="t.id">{{ t.nome }} — {{ t.anoLetivo }}</option>
          </select>
          <div class="error" *ngIf="campoInvalido('turmaId')">Selecione uma turma.</div>
        </div>

        <div>
          <label>Ano Letivo *</label>
          <input type="number" formControlName="anoLetivo" [class.invalid]="campoInvalido('anoLetivo')" />
          <div class="error" *ngIf="campoInvalido('anoLetivo')">Informe um ano válido.</div>
        </div>

        <div>
          <label>Status *</label>
          <select formControlName="status" [class.invalid]="campoInvalido('status')">
            <option *ngFor="let s of statusOptions" [value]="s">{{ s }}</option>
          </select>
          <div class="error" *ngIf="campoInvalido('status')">Selecione um status.</div>
        </div>
      </div>

      <div class="actions">
        <button type="button" class="btn-secondary" (click)="cancelar()">Cancelar</button>
        <button type="submit" class="btn-primary" [disabled]="loading">
          {{ loading ? 'Salvando...' : (isEdicao ? 'Atualizar' : 'Salvar') }}
        </button>
      </div>
    </form>
  </div>
</div>
