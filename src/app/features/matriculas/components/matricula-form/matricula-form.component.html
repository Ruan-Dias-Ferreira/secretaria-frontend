<div class="overlay" (click)="cancelar()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ isEdicao ? 'Editar Matrícula' : 'Nova Matrícula' }}</h2>
      <button mat-icon-button (click)="cancelar()" aria-label="Fechar">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="form">
      <div class="form-grid">
        <mat-form-field appearance="outline" class="full">
          <mat-label>Aluno</mat-label>
          <mat-select formControlName="alunoId">
            <mat-option *ngFor="let a of alunos" [value]="a.id">
              {{ a.nome }} ({{ a.cpf }})
            </mat-option>
          </mat-select>
          <mat-error *ngIf="form.get('alunoId')?.hasError('required')">Selecione um aluno.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full">
          <mat-label>Turma</mat-label>
          <mat-select formControlName="turmaId">
            <mat-option *ngFor="let t of turmas" [value]="t.id">
              {{ t.nome }} — {{ t.anoLetivo }}
            </mat-option>
          </mat-select>
          <mat-error *ngIf="form.get('turmaId')?.hasError('required')">Selecione uma turma.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Ano Letivo</mat-label>
          <input matInput type="number" formControlName="anoLetivo" />
          <mat-error *ngIf="form.get('anoLetivo')?.invalid">Informe um ano válido.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Status</mat-label>
          <mat-select formControlName="status">
            <mat-option *ngFor="let s of statusOptions" [value]="s">{{ s }}</mat-option>
          </mat-select>
          <mat-error *ngIf="form.get('status')?.hasError('required')">Selecione um status.</mat-error>
        </mat-form-field>
      </div>

      <div class="actions">
        <button type="button" mat-button (click)="cancelar()">Cancelar</button>
        <button type="submit" mat-flat-button color="primary" [disabled]="loading">
          <span *ngIf="!loading">{{ isEdicao ? 'Atualizar' : 'Salvar' }}</span>
          <span *ngIf="loading" class="loading-inline">
            <mat-spinner diameter="18"></mat-spinner> Salvando...
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
