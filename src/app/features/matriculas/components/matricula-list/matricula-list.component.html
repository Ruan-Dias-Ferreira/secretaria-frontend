<div class="page-container">
  <div class="page-header">
    <h1>Matrículas</h1>
    <button *ngIf="isSecretaria" mat-flat-button color="primary" (click)="abrirNovo()">
      <mat-icon>add</mat-icon>
      Nova Matrícula
    </button>
  </div>

  <div *ngIf="loading" class="loading-overlay">
    <mat-spinner diameter="48"></mat-spinner>
  </div>

  <table mat-table [dataSource]="matriculas" *ngIf="!loading && matriculas.length > 0">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let m">{{ m.id }}</td>
    </ng-container>

    <ng-container matColumnDef="alunoId">
      <th mat-header-cell *matHeaderCellDef>Aluno (ID)</th>
      <td mat-cell *matCellDef="let m">#{{ m.alunoId }}</td>
    </ng-container>

    <ng-container matColumnDef="turmaId">
      <th mat-header-cell *matHeaderCellDef>Turma (ID)</th>
      <td mat-cell *matCellDef="let m">#{{ m.turmaId }}</td>
    </ng-container>

    <ng-container matColumnDef="anoLetivo">
      <th mat-header-cell *matHeaderCellDef>Ano Letivo</th>
      <td mat-cell *matCellDef="let m">{{ m.anoLetivo }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let m">
        <span class="badge" [ngClass]="getBadgeClass(m.status)">{{ m.status }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef style="text-align:right;">Ações</th>
      <td mat-cell *matCellDef="let m">
        <div class="actions-cell">
          <mat-form-field
            *ngIf="isSecretaria"
            appearance="outline"
            class="status-select compact"
            subscriptSizing="dynamic"
          >
            <mat-label>Alterar status</mat-label>
            <mat-select [value]="m.status" (selectionChange)="alterarStatus(m.id, $event.value)">
              <mat-option *ngFor="let s of statusOptions" [value]="s">{{ s }}</mat-option>
            </mat-select>
          </mat-form-field>

          <button mat-icon-button matTooltip="Detalhes" (click)="abrirDetalhe(m.id)">
            <mat-icon>info</mat-icon>
          </button>
          <button
            *ngIf="isSecretaria"
            mat-icon-button
            color="primary"
            matTooltip="Editar"
            (click)="abrirEdicao(m.id)"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button
            *ngIf="isSecretaria"
            mat-icon-button
            color="warn"
            matTooltip="Excluir"
            (click)="excluir(m.id)"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <div *ngIf="!loading && matriculas.length === 0" class="empty-state">
    <mat-icon style="font-size:48px;width:48px;height:48px;">how_to_reg</mat-icon>
    <p>Nenhuma matrícula cadastrada.</p>
  </div>
</div>

<app-matricula-form
  *ngIf="modalAtivo === 'form'"
  [matriculaId]="matriculaSelecionadaId"
  (close)="fecharModal()">
</app-matricula-form>

<app-matricula-detail
  *ngIf="modalAtivo === 'detail' && matriculaSelecionadaId !== null"
  [matriculaId]="matriculaSelecionadaId"
  (close)="fecharModal()">
</app-matricula-detail>
