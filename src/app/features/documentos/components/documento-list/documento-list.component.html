<div class="page-container">
  <div class="page-header">
    <h1>Documentos</h1>
    <button mat-flat-button color="primary" (click)="abrirNovo()">
      <mat-icon>add</mat-icon>
      Emitir Documento
    </button>
  </div>

  <div *ngIf="loading" class="loading-overlay">
    <mat-spinner diameter="48"></mat-spinner>
  </div>

  <table mat-table [dataSource]="documentos" *ngIf="!loading && documentos.length > 0">

    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let d">{{ d.id }}</td>
    </ng-container>

    <ng-container matColumnDef="alunoId">
      <th mat-header-cell *matHeaderCellDef>Aluno (ID)</th>
      <td mat-cell *matCellDef="let d">#{{ d.alunoId }}</td>
    </ng-container>

    <ng-container matColumnDef="tipo">
      <th mat-header-cell *matHeaderCellDef>Tipo</th>
      <td mat-cell *matCellDef="let d">{{ getTipoLabel(d.tipo) }}</td>
    </ng-container>

    <ng-container matColumnDef="dataEmissao">
      <th mat-header-cell *matHeaderCellDef>Data de Emissão</th>
      <td mat-cell *matCellDef="let d">{{ d.dataEmissao }}</td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef style="text-align:right;">Ações</th>
      <td mat-cell *matCellDef="let d">
        <div class="actions-cell">
          <button mat-icon-button color="primary" matTooltip="Baixar PDF" (click)="baixarPdf(d)">
            <mat-icon>picture_as_pdf</mat-icon>
          </button>
          <button mat-icon-button color="warn" matTooltip="Excluir" (click)="excluir(d.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <div *ngIf="!loading && documentos.length === 0" class="empty-state">
    <mat-icon style="font-size:48px;width:48px;height:48px;">description</mat-icon>
    <p>Nenhum documento emitido.</p>
  </div>
</div>

<app-documento-form
  *ngIf="modalFormAberto"
  (close)="fecharModal()">
</app-documento-form>
